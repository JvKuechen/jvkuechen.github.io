<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>setcookie.dev</title>
  <!-- Cookie with a bite taken out of the upper-right.
       Ties the brand story: "setcookie" + the army nickname. -->
  <defs>
    <mask id="bite">
      <rect width="32" height="32" fill="white"/>
      <circle cx="26" cy="6" r="5.5" fill="black"/>
    </mask>
  </defs>
  <circle cx="15" cy="17" r="13" fill="#222" mask="url(#bite)"/>
  <circle cx="10" cy="14" r="1.5" fill="#FFA600"/>
  <circle cx="14" cy="20" r="1.5" fill="#FFA600"/>
  <circle cx="20" cy="23" r="1.5" fill="#FFA600"/>
  <circle cx="21" cy="14" r="1.2" fill="#FFA600"/>
  <circle cx="8" cy="20" r="1.1" fill="#FFA600"/>
</svg>
